<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Order — GrowVia</title>
  <meta name="description" content="Track your GrowVia order in real time with your Order ID." />
  <link id="favicon" rel="icon" type="image/png" href="Icon.png?v=3">
  <script>
    (function(){
      var d = document.documentElement;
      try { var t = localStorage.getItem('growvia-theme'); if (t) d.setAttribute('data-theme', t); } catch(e){}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: "Manrope", system-ui, sans-serif; min-height: 100vh; }
    .track-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 60px 22px 80px;
    }
    .track-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-3); text-decoration: none;
      font-size: 13px; font-weight: 600;
      padding: 8px 14px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 28px;
      transition: all 0.2s var(--ease);
    }
    .track-back:hover { color: var(--text); border-color: var(--accent); }
    .track-back svg { width: 14px; height: 14px; }

    .track-hero {
      text-align: center; margin-bottom: 36px;
    }
    .track-hero h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .track-hero h1 em {
      font-style: normal;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .track-hero p {
      font-size: 15px; color: var(--text-3); max-width: 480px; margin: 0 auto;
      line-height: 1.6;
    }

    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px 26px 28px;
      box-shadow: 0 24px 60px -32px rgba(0,0,0,0.4);
    }
    .track-form {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .track-form .control {
      flex: 1; min-width: 200px;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .track-form button {
      padding: 0 24px;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: var(--accent-grad);
      color: var(--on-accent);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
      box-shadow: 0 12px 30px -12px var(--accent);
    }
    .track-form button:hover { transform: translateY(-1px); box-shadow: 0 16px 40px -12px var(--accent); }
    .track-form button svg { width: 16px; height: 16px; }

    .track-hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-3);
    }

    .track-error {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(224,96,79,0.08);
      border: 1px solid rgba(224,96,79,0.3);
      color: #e0604f;
      font-size: 13.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .track-error svg { width: 18px; height: 18px; flex-shrink: 0; }

    .track-result {
      margin-top: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px -32px rgba(0,0,0,0.4);
    }
    .tr-head {
      background: linear-gradient(135deg, rgba(84,104,255,0.12), rgba(138,92,246,0.08));
      padding: 22px 26px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .tr-id-lbl {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .tr-id {
      font-family: "Space Grotesk", sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: 0.01em;
      color: var(--text);
    }
    .tr-status {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .tr-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .tr-status.pending    { background: rgba(217,119,6,0.12); color: #d97706; }
    .tr-status.pending .dot { background: #d97706; animation: pulse 2s infinite; }
    .tr-status.processing { background: rgba(84,104,255,0.12); color: var(--accent-text); }
    .tr-status.processing .dot { background: var(--accent); animation: pulse 1.4s infinite; }
    .tr-status.completed  { background: rgba(25,181,145,0.14); color: #19b591; }
    .tr-status.completed .dot { background: #19b591; }
    .tr-status.cancelled  { background: rgba(224,96,79,0.12); color: #e0604f; }
    .tr-status.cancelled .dot { background: #e0604f; }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.4; transform: scale(1.3); }
    }

    .tr-body { padding: 24px 26px 26px; }

    .tr-timeline {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 26px;
    }
    .tr-step {
      text-align: center;
      padding: 14px 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      position: relative;
    }
    .tr-step.active {
      border-color: var(--accent);
      background: rgba(84,104,255,0.08);
    }
    .tr-step.done {
      border-color: rgba(25,181,145,0.4);
      background: rgba(25,181,145,0.06);
    }
    .tr-step-icon {
      width: 32px; height: 32px; border-radius: 50%;
      margin: 0 auto 8px;
      display: grid; place-items: center;
      background: var(--surface);
      color: var(--text-3);
      border: 1px solid var(--border);
    }
    .tr-step.done .tr-step-icon { background: #19b591; color: #fff; border-color: #19b591; }
    .tr-step.active .tr-step-icon { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .tr-step-icon svg { width: 14px; height: 14px; }
    .tr-step-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .tr-step.active .tr-step-label, .tr-step.done .tr-step-label { color: var(--text); }

    .tr-detail {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 24px;
    }
    .tr-cell {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
    }
    .tr-cell-lbl {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .tr-cell-val {
      font-size: 14px; font-weight: 700;
      color: var(--text);
    }

    .tr-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .tr-actions a {
      flex: 1; min-width: 160px;
      padding: 13px 18px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      font-size: 13.5px; font-weight: 700;
      transition: transform 0.2s var(--ease);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tr-actions a:hover { transform: translateY(-1px); }
    .tr-wa-btn {
      background: #25d366; color: #fff;
      box-shadow: 0 12px 30px -16px #25d366;
    }
    .tr-home-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .tr-actions svg { width: 16px; height: 16px; }

    @media (max-width: 540px) {
      .tr-detail { grid-template-columns: 1fr; }
      .tr-timeline { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <main class="track-wrap">
    <a href="/" class="track-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Back to GrowVia
    </a>

    <div class="track-hero">
      <h1>Track Your <em>Order</em></h1>
      <p>Enter your Order ID below and we'll show you the live status — no signup, no waiting.</p>
    </div>

    <div class="track-card">
      <form id="trackForm" class="track-form" novalidate>
        <input id="trackId" class="control" type="text" placeholder="e.g. GRV-300526-7191" required spellcheck="false" autocomplete="off" />
        <button type="submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Track Order
        </button>
      </form>
      <div class="track-hint">Your Order ID was shared with you on WhatsApp and the order confirmation screen.</div>
      <div id="trackError" class="track-error" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="trackErrorText">No order found with that ID.</span>
      </div>
    </div>

    <div id="trackResult"></div>
  </main>

  <script>
  (function() {
    var WA_NUMBER = '923143632195';
    fetch('/api/config').then(function(r){return r.ok?r.json():null;}).then(function(c){
      if (c && c.whatsappNumber) WA_NUMBER = c.whatsappNumber.replace(/\D/g,'');
    }).catch(function(){});

    var form  = document.getElementById('trackForm');
    var input = document.getElementById('trackId');
    var err   = document.getElementById('trackError');
    var errT  = document.getElementById('trackErrorText');
    var out   = document.getElementById('trackResult');

    function showError(msg) {
      errT.textContent = msg;
      err.style.display = 'flex';
      out.innerHTML = '';
    }
    function hideError() { err.style.display = 'none'; }

    var STEPS = [
      { key:'pending',    label:'Received',  icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>' },
      { key:'processing', label:'Processing', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>' },
      { key:'completed',  label:'Delivered',  icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>' },
      { key:'cancelled',  label:'Closed',     icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' }
    ];

    function renderResult(o) {
      hideError();
      var when = new Date(o.createdAt).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      var serviceLine = o.mode === 'bulk'
        ? 'Bulk · ' + o.itemCount + ' item' + (o.itemCount !== 1 ? 's' : '')
        : (o.platform || '—') + ' · ' + (o.service || '—');

      // Timeline state
      var stepHtml = STEPS.filter(function(s){
        // For cancelled: show only Received + Cancelled
        if (o.status === 'cancelled') return s.key === 'pending' || s.key === 'cancelled';
        // Otherwise hide cancelled
        return s.key !== 'cancelled';
      }).map(function(s, i, arr) {
        var idx = arr.findIndex(function(x){ return x.key === o.status; });
        var cls = '';
        if (i < idx) cls = 'done';
        else if (i === idx) cls = 'active';
        return '<div class="tr-step ' + cls + '">' +
                 '<div class="tr-step-icon">' + s.icon + '</div>' +
                 '<div class="tr-step-label">' + s.label + '</div>' +
               '</div>';
      }).join('');

      var waMsg = encodeURIComponent('Hi! I want to ask about my order: ' + o.id);
      var waLink = 'https://wa.me/' + WA_NUMBER + '?text=' + waMsg;

      out.innerHTML =
        '<div class="track-result">' +
          '<div class="tr-head">' +
            '<div><div class="tr-id-lbl">Order ID</div><div class="tr-id">' + o.id + '</div></div>' +
            '<div class="tr-status ' + o.status + '"><span class="dot"></span>' + o.status + '</div>' +
          '</div>' +
          '<div class="tr-body">' +
            '<div class="tr-timeline">' + stepHtml + '</div>' +
            '<div class="tr-detail">' +
              '<div class="tr-cell"><div class="tr-cell-lbl">Service</div><div class="tr-cell-val">' + serviceLine + '</div></div>' +
              '<div class="tr-cell"><div class="tr-cell-lbl">Quality</div><div class="tr-cell-val">' + o.quality + '</div></div>' +
              '<div class="tr-cell"><div class="tr-cell-lbl">Total</div><div class="tr-cell-val">' + (o.totalPrice || '—') + '</div></div>' +
              '<div class="tr-cell"><div class="tr-cell-lbl">Placed On</div><div class="tr-cell-val">' + when + '</div></div>' +
              '<div class="tr-cell" style="grid-column:1/-1;"><div class="tr-cell-lbl">Customer</div><div class="tr-cell-val">' + (o.customer.name || '—') + ' · ' + (o.customer.phone || '—') + '</div></div>' +
            '</div>' +
            '<div class="tr-actions">' +
              '<a href="' + waLink + '" target="_blank" rel="noopener" class="tr-wa-btn">' +
                '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>' +
                'Contact on WhatsApp' +
              '</a>' +
              '<a href="/" class="tr-home-btn">Place Another Order</a>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    function track(id) {
      id = String(id || '').trim().toUpperCase();
      if (!id) { showError('Please enter an Order ID.'); return; }
      hideError();
      out.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-3);font-size:14px;">Looking up your order…</div>';
      fetch('/api/orders/' + encodeURIComponent(id) + '/track', { cache: 'no-store' })
        .then(function(r){ if (r.status === 404) throw new Error('not-found'); return r.json(); })
        .then(function(o){ if (o && o.id) renderResult(o); else throw new Error('bad'); })
        .catch(function(e){
          out.innerHTML = '';
          showError(e.message === 'not-found' ? 'No order found with that ID. Please check and try again.' : 'Unable to fetch order. Please try again.');
        });
    }

    form.addEventListener('submit', function(e){ e.preventDefault(); track(input.value); });

    // Auto-track from URL ?id=GRV-...
    var qs = new URLSearchParams(location.search);
    if (qs.get('id')) { input.value = qs.get('id'); track(qs.get('id')); }
  })();
  </script>
</body>
</html>
