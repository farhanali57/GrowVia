<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowVia — Admin Sign In</title>
  <meta name="description" content="Secure admin login for GrowVia control panel." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Login page overrides ── */
    html, body { height: 100%; }
    body.login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08090f;
      overflow: hidden;
      position: relative;
    }

    /* Animated ambient blobs */
    .login-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .login-bg .lb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      opacity: 0.55; mix-blend-mode: screen;
    }
    .login-bg .lb1 {
      width: 60vw; height: 60vw;
      top: -20%; left: -10%;
      background: radial-gradient(circle, #5468ff 0%, transparent 65%);
      animation: lbDrift1 18s ease-in-out infinite;
    }
    .login-bg .lb2 {
      width: 50vw; height: 50vw;
      bottom: -15%; right: -10%;
      background: radial-gradient(circle, #8a5cf6 0%, transparent 65%);
      animation: lbDrift2 22s ease-in-out infinite;
    }
    .login-bg .lb3 {
      width: 35vw; height: 35vw;
      top: 40%; left: 50%;
      background: radial-gradient(circle, #2bb6e0 0%, transparent 65%);
      animation: lbDrift3 26s ease-in-out infinite;
    }
    @keyframes lbDrift1 {
      0%,100%  { transform: translate(0,0) scale(1); }
      50%      { transform: translate(8%,12%) scale(1.15); }
    }
    @keyframes lbDrift2 {
      0%,100%  { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-10%,-8%) scale(1.12); }
    }
    @keyframes lbDrift3 {
      0%,100%  { transform: translate(-50%,-50%) scale(1); }
      50%      { transform: translate(-45%,-55%) scale(1.2); }
    }

    /* Grid noise */
    .login-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(84,104,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(84,104,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Card */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      padding: 20px;
      animation: loginSlideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes loginSlideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(10, 12, 22, 0.82);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(84,104,255,0.12),
        0 40px 100px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    /* top gradient border */
    .login-card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(84,104,255,0.7), rgba(138,92,246,0.5), transparent);
    }
    /* inner glow */
    .login-card::after {
      content: "";
      position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 120px;
      background: radial-gradient(ellipse, rgba(84,104,255,0.18), transparent 70%);
      pointer-events: none;
    }

    /* Brand header */
    .login-brand {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 30px;
    }
    .login-badge {
      width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #5468ff, #8a5cf6);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 800; font-size: 22px; color: #fff;
      box-shadow: 0 8px 24px -8px rgba(84,104,255,0.6);
      position: relative;
      animation: badgePulse 3s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%,100% { box-shadow: 0 8px 24px -8px rgba(84,104,255,0.6); }
      50%      { box-shadow: 0 8px 40px -4px rgba(84,104,255,0.9); }
    }
    .login-badge-text { display: flex; flex-direction: column; gap: 3px; }
    .login-company {
      font-size: 11px; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      font-weight: 600;
    }
    .login-card h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.02em; color: #eef0f7;
    }

    /* Subtitle */
    .login-sub {
      color: rgba(169,174,194,0.8);
      font-size: 14px; line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Form */
    .login-form { display: flex; flex-direction: column; gap: 16px; }

    .login-field {
      display: flex; flex-direction: column; gap: 7px;
    }
    .login-field label {
      font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(169,174,194,0.7);
    }
    .login-input-wrap { position: relative; }
    .login-input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(107,113,134,0.8); pointer-events: none;
      display: grid; place-items: center;
    }
    .login-input-icon svg { width: 17px; height: 17px; }
    .login-control {
      width: 100%; height: 50px;
      padding: 0 16px 0 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      color: #eef0f7; font-size: 15px;
      font-family: "Manrope", sans-serif;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .login-control::placeholder { color: rgba(107,113,134,0.7); }
    .login-control:focus {
      outline: none;
      border-color: rgba(84,104,255,0.6);
      box-shadow: 0 0 0 4px rgba(84,104,255,0.15);
      background: rgba(84,104,255,0.06);
    }

    /* Show/hide password toggle */
    .login-pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(107,113,134,0.7); cursor: pointer;
      background: none; border: none; padding: 4px;
      display: grid; place-items: center;
      transition: color 0.2s;
    }
    .login-pw-toggle:hover { color: rgba(169,174,194,0.9); }
    .login-pw-toggle svg { width: 17px; height: 17px; }

    /* Submit */
    .login-submit {
      position: relative; overflow: hidden;
      width: 100%; height: 52px;
      border-radius: 14px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #5468ff, #8a5cf6);
      color: #fff; font-family: "Space Grotesk", sans-serif;
      font-weight: 700; font-size: 15px; letter-spacing: 0.01em;
      margin-top: 6px;
      box-shadow: 0 14px 32px -12px rgba(84,104,255,0.7);
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.25s cubic-bezier(0.22,1,0.36,1),
                  filter 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -10px rgba(84,104,255,0.8);
      filter: brightness(1.08);
    }
    .login-submit:active { transform: translateY(0); }
    .login-submit .shine {
      position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-18deg);
    }
    .login-submit:hover .shine { animation: loginShine 0.85s ease; }
    @keyframes loginShine { to { left: 130%; } }
    .login-submit svg { width: 18px; height: 18px; }

    /* Bottom label */
    .login-footer-note {
      text-align: center; margin-top: 22px;
      font-size: 12px; color: rgba(107,113,134,0.7);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .login-footer-note svg { width: 13px; height: 13px; color: #5468ff; }

    /* Status badge (top right of card) */
    .login-status {
      position: absolute; top: 22px; right: 22px;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 999px;
      background: rgba(25,181,100,0.12);
      border: 1px solid rgba(25,181,100,0.22);
      font-size: 11.5px; font-weight: 700; color: #3dffa0;
      letter-spacing: 0.05em;
    }
    .login-status .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #3dffa0;
      box-shadow: 0 0 0 0 rgba(61,255,160,0.5);
      animation: statusPulse 2s infinite;
    }
    @keyframes statusPulse {
      0%   { box-shadow: 0 0 0 0 rgba(61,255,160,0.5); }
      70%  { box-shadow: 0 0 0 7px rgba(61,255,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(61,255,160,0); }
    }

    /* Error flash */
    .login-error {
      display: none;
      padding: 12px 16px; border-radius: 10px;
      background: rgba(224,96,79,0.12);
      border: 1px solid rgba(224,96,79,0.28);
      color: #ff8a7a; font-size: 13.5px; font-weight: 600;
      text-align: center;
    }
    .login-error.show { display: block; animation: errShake 0.35s ease; }
    @keyframes errShake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }

    /* Divider */
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: ""; flex: 1;
      height: 1px; background: rgba(255,255,255,0.07);
    }
    .login-divider span {
      font-size: 11px; color: rgba(107,113,134,0.6);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
  </style>
</head>
<body class="login-screen">

  <!-- Ambient background -->
  <div class="login-bg" aria-hidden="true">
    <span class="lb lb1"></span>
    <span class="lb lb2"></span>
    <span class="lb lb3"></span>
  </div>
  <div class="login-grid" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Live status badge -->
      <div class="login-status" aria-label="System operational">
        <span class="dot"></span>
        <span>Secure Portal</span>
      </div>

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-badge">G</div>
        <div class="login-badge-text">
          <span class="login-company">GrowVia Control Panel</span>
          <h1>Admin Sign In</h1>
        </div>
      </div>

      <p class="login-sub">
        Enter your administrator credentials to manage brand settings, testimonials, offers, and FAQ content.
      </p>

      <!-- Error message -->
      <div class="login-error" id="loginError" role="alert">
        ✗ Invalid username or password. Please try again.
      </div>

      <!-- Form -->
      <form action="/login" method="post" class="login-form" id="loginForm">
        <div class="login-field">
          <label for="username">Username</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4z"/><path d="M6 20v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1"/>
              </svg>
            </span>
            <input id="username" name="username" class="login-control" type="text"
              placeholder="Enter your username" autocomplete="username" required />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
              </svg>
            </span>
            <input id="password" name="password" class="login-control" type="password"
              placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="login-pw-toggle" id="pwToggle" aria-label="Show password">
              <svg id="pwEyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="pwEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none">
                <path d="M17.94 17.94A10.1 10.1 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <path d="M1 1l22 22"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-submit" id="loginBtn">
          <span class="shine"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span id="loginBtnLabel">Sign in to Dashboard</span>
        </button>
      </form>

      <div class="login-footer-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l8 4v6c0 5-3.4 8.3-8 10-4.6-1.7-8-5-8-10V6l8-4z" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Protected by end-to-end encryption · GrowVia Admin
      </div>
    </div>
  </div>

  <script>
    // Password toggle
    var pwToggle = document.getElementById('pwToggle');
    var pwInput = document.getElementById('password');
    var pwEyeOn = document.getElementById('pwEyeOn');
    var pwEyeOff = document.getElementById('pwEyeOff');
    pwToggle.addEventListener('click', function () {
      var isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      pwEyeOn.style.display = isText ? 'block' : 'none';
      pwEyeOff.style.display = isText ? 'none' : 'block';
    });

    // Show error if URL has ?error
    if (window.location.search.includes('error')) {
      document.getElementById('loginError').classList.add('show');
    }

    // Loading state on submit
    document.getElementById('loginForm').addEventListener('submit', function () {
      var btn = document.getElementById('loginBtn');
      var label = document.getElementById('loginBtnLabel');
      btn.disabled = true;
      btn.style.opacity = '0.8';
      label.textContent = 'Signing in…';
    });

    // Fetch and apply branding config
    function applyBranding() {
      fetch('/api/config')
        .then(function (res) { return res.ok ? res.json() : Promise.reject(); })
        .then(function (data) {
          var bName = data.brandName || 'GrowVia';
          var bTag = data.brandTagline || 'Your Growth. Our Mission.';
          var logoUrl = data.logoImageUrl || '';

          // Update page title
          document.title = bName + ' — Admin Sign In';

          // Update company text
          var compEl = document.querySelector('.login-company');
          if (compEl) compEl.textContent = bName + ' Control Panel';

          // Update footer note
          var footerNote = document.querySelector('.login-footer-note');
          if (footerNote) {
            footerNote.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.4 8.3-8 10-4.6-1.7-8-5-8-10V6l8-4z" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg> Protected by end-to-end encryption · ' + bName + ' Admin';
          }

          // Update logo badge (image if exists, first letter otherwise)
          var badge = document.querySelector('.login-badge');
          if (badge) {
            if (logoUrl) {
              badge.innerHTML = '<img src="' + logoUrl + '" alt="' + bName + '" style="width:100%; height:100%; object-fit:contain; border-radius:12px;" />';
              badge.style.background = 'transparent';
              badge.style.boxShadow = 'none';
            } else {
              badge.textContent = bName.charAt(0).toUpperCase();
              badge.style.background = 'linear-gradient(135deg, #5468ff, #8a5cf6)';
            }
          }
        })
        .catch(function () {});
    }
    applyBranding();
  </script>
</body>
</html>
